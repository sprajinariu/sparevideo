name: Regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y verilator

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install fusesoc
          .venv/bin/pip install -r requirements.txt
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Check no large generated files committed
        run: |
          bad=$(git ls-files -- '*.vcd' '*.vvp' '*.bin' 'dv/data/*.txt' \
                ':!hw/ip/motion/tb/golden/*.bin' | head -20)
          if [ -n "$bad" ]; then
            echo "ERROR: large/generated files found in repo:"
            echo "$bad"
            exit 1
          fi

      - name: Import check
        run: |
          cd py && ../.venv/bin/python -c \
            "import frames.frame_io, frames.video_source, viz.render, models"

      - name: Python unit tests
        run: make test-py

      - name: Lint
        run: make lint

      - name: Compile
        run: make compile

      - name: Dry-run (file loopback, zero sim time)
        run: make sw-dry-run

      - name: Block IP testbenches
        run: make test-ip

      - name: Pipeline — passthrough, default SOURCE
        run: make run-pipeline CTRL_FLOW=passthrough

      - name: Pipeline — passthrough, textured_static
        run: make run-pipeline SOURCE="synthetic:textured_static" CTRL_FLOW=passthrough

      - name: Pipeline — passthrough, binary mode
        run: make run-pipeline MODE=binary CTRL_FLOW=passthrough

      - name: Pipeline — motion, moving_box
        run: make run-pipeline SOURCE="synthetic:moving_box" CTRL_FLOW=motion

      - name: Pipeline — motion, dark_moving_box
        run: make run-pipeline SOURCE="synthetic:dark_moving_box" CTRL_FLOW=motion

      - name: Pipeline — motion, two_boxes
        run: make run-pipeline SOURCE="synthetic:two_boxes" CTRL_FLOW=motion

      - name: Pipeline — motion, textured_static (static scene)
        run: make run-pipeline SOURCE="synthetic:textured_static" CTRL_FLOW=motion

      - name: Pipeline — mask, moving_box
        run: make run-pipeline SOURCE="synthetic:moving_box" CTRL_FLOW=mask

      - name: Pipeline — mask, dark_moving_box
        run: make run-pipeline SOURCE="synthetic:dark_moving_box" CTRL_FLOW=mask
